name: Supabase Migrate (Prod)

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    # Skip if the repo doesn't currently have Supabase migrations checked in.
    if: ${{ hashFiles('supabase/migrations/*.sql') != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project (Prod)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}" --yes

      - name: Push migrations (Prod)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_PROD }}
        run: supabase db push --include-all --include-seed --yes
