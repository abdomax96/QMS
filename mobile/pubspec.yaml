name: qms_ncr
description: "QMS NCR Mobile App - Mobile client for Non-Conformance Reports."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.0

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Secure / local storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: 2.5.3

  # Formatting & i18n
  intl: ^0.20.2

  # Files & media
  image_picker: ^1.1.2
  file_picker: ^8.1.6

  # Connectivity
  connectivity_plus: ^6.1.0

  # Utils
  uuid: ^4.5.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
